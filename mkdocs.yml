site_name: NKP Field Docs
site_description: >-
  Practical architecture and installation guidance for Nutanix Kubernetes
  Platform engineers.
site_author: Julian Hennig

site_url: https://jlnhnng.github.io/nkp-field-docs/
repo_name: jlnhnng/nkp-field-docs
repo_url: https://github.com/jlnhnng/nkp-field-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  icon:
    logo: material/kubernetes
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra_css:
  - stylesheets/extra.css

copyright: >-
  Independent field documentation — not an official Nutanix publication.

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jlnhnng/nkp-field-docs

